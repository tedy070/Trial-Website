<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Globe Express – Travel & Holidays</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
/* ══════════════════════════════════════════
   RESET & ROOT
══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold:      #c9a84c;
  --gold-lt:   #e8c96a;
  --gold-dim:  rgba(201,168,76,0.22);
  --w70:  rgba(255,255,255,0.70);
  --w50:  rgba(255,255,255,0.50);
  --w10:  rgba(255,255,255,0.10);
  --dark:  #0d0b09;
  --dark2: #120f0b;
  --dark3: #181410;
  --nav-h: 64px;
  --bg-grad: radial-gradient(ellipse 120% 80% at 15% 10%, rgba(201,168,76,0.07) 0%, transparent 55%),
             radial-gradient(ellipse 80% 60% at 85% 90%, rgba(255,255,255,0.025) 0%, transparent 50%),
             #0d0b09;
  --bg-grad2: radial-gradient(ellipse 100% 70% at 90% 5%, rgba(201,168,76,0.055) 0%, transparent 50%),
              radial-gradient(ellipse 70% 50% at 10% 95%, rgba(255,255,255,0.018) 0%, transparent 45%),
              #120f0b;
  --bg-grad3: radial-gradient(ellipse 90% 60% at 50% 50%, rgba(201,168,76,0.04) 0%, transparent 60%),
              #181410;
}

/* ══════════════════════════════════════════
   BASE
══════════════════════════════════════════ */
html { scroll-behavior: smooth; }

body {
  font-family: 'Montserrat', sans-serif;
  background: var(--bg-grad);
  color: #fff;
  overflow-x: hidden;
  transition: background 0.4s, color 0.4s;
}

/* LIGHT MODE */
body.light {
  --dark:  #f5f0e8;
  --dark2: #ede6da;
  --dark3: #e4dace;
  --bg-grad:  radial-gradient(ellipse 120% 80% at 15% 10%, rgba(201,168,76,0.10) 0%, transparent 55%),
              radial-gradient(ellipse 80% 60% at 85% 90%, rgba(201,168,76,0.06) 0%, transparent 50%),
              #f5f0e8;
  --bg-grad2: radial-gradient(ellipse 100% 70% at 90% 5%, rgba(201,168,76,0.08) 0%, transparent 50%),
              radial-gradient(ellipse 70% 50% at 10% 95%, rgba(201,168,76,0.05) 0%, transparent 45%),
              #ede6da;
  --bg-grad3: radial-gradient(ellipse 90% 60% at 50% 50%, rgba(201,168,76,0.07) 0%, transparent 60%),
              #e4dace;
  background: var(--bg-grad);
  color: #1a1208;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

/* ══════════════════════════════════════════
   NAV — fixed, transparent on hero
══════════════════════════════════════════ */
#mainNav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px;
  background: transparent;
  border-bottom: 1px solid transparent;
  transition: background 0.4s, border-color 0.4s, backdrop-filter 0.4s;
}
#mainNav.solid {
  background: rgba(6,6,6,0.85);
  border-bottom-color: rgba(255,255,255,0.07);
  backdrop-filter: blur(20px);
}
body.light #mainNav.solid {
  background: rgba(18,15,11,0.88);
  border-bottom-color: rgba(201,168,76,0.18);
  backdrop-filter: blur(20px);
}

/* Logo */
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 3px; cursor: pointer;
  text-decoration: none; flex-shrink: 0;
  transition: color 0.3s;
}
body.light .nav-logo { color: #fff; }
.nav-logo-ring {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1.5px solid var(--gold);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.nav-logo-ring i { color: var(--gold); font-size: 15px; }

/* Links */
.nav-links { display: flex; gap: 30px; list-style: none; }
.nav-links a {
  color: rgba(255,255,255,0.78); font-size: 10px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase; text-decoration: none;
  position: relative; padding-bottom: 3px; cursor: pointer; transition: color 0.25s;
}
.nav-links a:hover { color: #fff; }
.nav-links a.active { color: #fff; }
.nav-links a.active::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: -1px;
  height: 1.5px; background: var(--gold); border-radius: 1px;
}
body.light .nav-links a { color: rgba(255,255,255,0.82); }
body.light .nav-links a:hover,
body.light .nav-links a.active { color: #fff; }

/* Actions */
.nav-actions { display: flex; align-items: center; gap: 10px; }

/* Dark mode btn */
.btn-dm {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.22);
  background: rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; overflow: hidden;
  transition: border-color 0.25s, background 0.25s;
  flex-shrink: 0;
}
.btn-dm:hover { border-color: var(--gold); background: rgba(201,168,76,0.15); }
.btn-dm i { font-size: 16px; color: rgba(255,255,255,0.80); position: absolute; transition: opacity 0.3s, transform 0.3s; }
.btn-dm .ic-moon { opacity: 1; transform: scale(1) rotate(0deg); }
.btn-dm .ic-sun  { opacity: 0; transform: scale(0.4) rotate(90deg); }
body.light .btn-dm .ic-moon { opacity: 0; transform: scale(0.4) rotate(-90deg); }
body.light .btn-dm .ic-sun  { opacity: 1; transform: scale(1) rotate(0deg); }
body.light .btn-dm { border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.10); }
body.light .btn-dm i { color: rgba(255,255,255,0.85); }
body.light .btn-dm:hover { border-color: var(--gold); background: rgba(201,168,76,0.20); }

/* Language pills — now individual round buttons */
/* Single globe language toggle */
.lang-globe {
  position: relative;
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.22);
  background: rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; overflow: hidden;
  transition: border-color 0.25s, background 0.25s;
}
.lang-globe:hover { border-color: var(--gold); background: rgba(201,168,76,0.15); }
body.light .lang-globe { border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.10); }
body.light .lang-globe:hover { border-color: var(--gold); background: rgba(201,168,76,0.20); }

/* Globe SVG lines */
.lang-globe-icon {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.45; transition: opacity 0.25s;
}
.lang-globe:hover .lang-globe-icon { opacity: 0.70; }
body.light .lang-globe-icon { opacity: 0.35; }

/* Language code label */
.lang-globe-lbl {
  position: relative; z-index: 2;
  font-family: 'Montserrat', sans-serif;
  font-size: 8.5px; font-weight: 800; letter-spacing: 0.5px;
  text-transform: uppercase; color: rgba(255,255,255,0.90);
  text-shadow: 0 0 8px rgba(0,0,0,0.6);
  transition: color 0.25s;
  line-height: 1;
}
body.light .lang-globe-lbl { color: rgba(255,255,255,0.90); text-shadow: 0 0 8px rgba(0,0,0,0.5); }
.lang-globe:hover .lang-globe-lbl { color: var(--gold); }

/* ══════════════════════════════════════════
   SECTIONS
══════════════════════════════════════════ */
.sec { position: relative; width: 100%; min-height: 100vh; }
/* all sections except home get top padding for fixed nav */
.sec + .sec { padding-top: var(--nav-h); }

/* shared page-label */
.plabel {
  font-size: 9px; font-weight: 700; letter-spacing: 4px;
  text-transform: uppercase; color: var(--gold);
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.plabel::before { content: ''; width: 24px; height: 1px; background: var(--gold); flex-shrink: 0; }

/* shared filter tabs */
.filter-row {
  display: flex; gap: 8px; padding: 22px 64px 18px;
  border-bottom: 0.5px solid rgba(255,255,255,0.07); flex-wrap: wrap;
}
body.light .filter-row { border-bottom-color: rgba(26,18,8,0.08); }

.ftab {
  padding: 8px 20px; border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.14); background: transparent;
  color: var(--w50); font-family: 'Montserrat', sans-serif;
  font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; transition: all 0.22s;
}
.ftab:hover { border-color: rgba(255,255,255,0.38); color: #fff; }
.ftab.on { background: var(--gold); border-color: var(--gold); color: #1a1208; }
body.light .ftab { border-color: rgba(26,18,8,0.14); color: rgba(26,18,8,0.50); }
body.light .ftab:hover { border-color: rgba(26,18,8,0.38); color: #1a1208; }

/* ══════════════════════════════════════════
   HOME
══════════════════════════════════════════ */
#sec-home {
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}
.home-wrap { position: relative; flex: 1; }

.hero-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: background-image 0.9s ease;
}
.hero-ov {
  position: absolute; inset: 0;
  background: linear-gradient(105deg, rgba(0,0,0,0.72) 30%, rgba(0,0,0,0.18) 70%);
}

.hero-txt {
  position: absolute; z-index: 10;
  top: 50%; transform: translateY(-50%);
  left: 48px; max-width: 500px;
}
.loc-tag {
  display: flex; align-items: center; gap: 14px; margin-bottom: 12px;
}
.loc-tag::before {
  content: ''; width: 28px; height: 1.5px; background: var(--gold); flex-shrink: 0;
}
.loc-tag span { color: var(--w70); font-size: 12px; letter-spacing: 1.2px; }

.hero-title {
  font-size: clamp(44px, 6vw, 78px); font-weight: 900; line-height: 0.95;
  text-transform: uppercase; letter-spacing: -1.5px;
  text-shadow: 0 2px 30px rgba(0,0,0,0.5); margin-bottom: 18px;
}
.hero-desc { color: var(--w50); font-size: 11px; line-height: 1.75; max-width: 280px; margin-bottom: 28px; }

.hero-actions { display: flex; align-items: center; gap: 16px; }
.btn-play {
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--gold); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, background 0.2s; flex-shrink: 0;
}
.btn-play:hover { transform: scale(1.1); background: var(--gold-lt); }
.btn-play i { color: #fff; font-size: 17px; margin-left: 2px; }

.btn-disc {
  border: 1px solid rgba(255,255,255,0.42); background: transparent; color: #fff;
  font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase; padding: 12px 26px; border-radius: 3px;
  cursor: pointer; transition: all 0.25s;
}
.btn-disc:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.80); }

/* Bottom controls */
.hero-bot {
  position: absolute; bottom: 28px; left: 48px; right: 48px; z-index: 10;
  display: flex; align-items: flex-end; gap: 0;
}
.ctrl-col { display: flex; flex-direction: column; gap: 14px; margin-right: 28px; flex-shrink: 0; }
.arr-row { display: flex; gap: 10px; }
.arr-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.28); background: rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.arr-btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.65); }
.arr-btn i { color: #fff; font-size: 14px; }
.prog-bar { width: 150px; height: 2px; background: rgba(255,255,255,0.18); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.6s ease; }

.cards-row { display: flex; gap: 10px; align-items: flex-end; flex: 1; }
.hcard {
  width: 122px; height: 185px; border-radius: 12px; overflow: hidden; position: relative;
  cursor: pointer; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,0.14);
  transition: transform 0.35s, border-color 0.35s, box-shadow 0.35s;
}
.hcard:hover { transform: translateY(-6px) scale(1.025); border-color: rgba(255,255,255,0.34); box-shadow: 0 16px 40px rgba(0,0,0,0.5); }
.hcard.on { border-color: var(--gold); transform: translateY(-8px) scale(1.04); }
.hcard-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(0.55); transition: filter 0.3s; }
.hcard:hover .hcard-bg { filter: brightness(0.70); }
.hcard-shade { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.85) 40%, transparent 100%); }
.hcard-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 12px; }
.hcard-reg { color: rgba(255,255,255,0.58); font-size: 8px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.hcard-name { color: #fff; font-size: 11.5px; font-weight: 800; text-transform: uppercase; line-height: 1.2; }

.slide-num { position: absolute; bottom: 22px; right: 48px; z-index: 10; color: rgba(255,255,255,0.38); font-size: 30px; font-weight: 800; }
.slide-num b { color: #fff; font-weight: 800; }

.scroll-hint {
  position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; z-index: 10; animation: shBounce 2s ease infinite;
}
.scroll-hint span { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--w50); }
.scroll-hint i { font-size: 18px; color: var(--gold); }
@keyframes shBounce {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(7px); }
}

/* ══════════════════════════════════════════
   HOLIDAYS
══════════════════════════════════════════ */
#sec-holidays { background: var(--bg-grad2); }

.hhero {
  position: relative; height: 54vh; min-height: 320px;
  overflow: hidden; display: flex; align-items: flex-end;
}
.hhero-bg {
  position: absolute; inset: 0; background-size: cover; background-position: center;
  transform: scale(1.05); animation: slowZoom 20s ease infinite alternate;
  transition: background-image 0.75s ease;
}
@keyframes slowZoom { from { transform:scale(1.05); } to { transform:scale(1.12); } }
.hhero-ov {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, rgba(10,10,10,0.88) 100%);
}
.hhero-txt { position: relative; z-index: 2; padding: 48px 64px; }
.hhero-txt h1 { font-size: clamp(40px, 5vw, 68px); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; line-height: 0.95; }

.hhero-tag {
  position: absolute; top: 80px; right: 28px; z-index: 3;
  background: rgba(201,168,76,0.12); border: 0.5px solid var(--gold);
  padding: 6px 14px; border-radius: 20px;
  font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold);
}

.hgrid {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 20px; padding: 24px 64px 80px;
}
.hgcard {
  border-radius: 16px; overflow: hidden; background: var(--dark3);
  border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
  transition: transform 0.4s cubic-bezier(0.23,1,0.32,1), box-shadow 0.4s, border-color 0.4s;
}
body.light .hgcard { background: var(--dark2); border-color: rgba(26,18,8,0.10); }
.hgcard:hover {
  transform: translateY(-10px) rotateX(2deg);
  box-shadow: 0 30px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(201,168,76,0.20);
  border-color: rgba(201,168,76,0.30);
}
.hgcard:hover .hgimg { transform: scale(1.06); }
.hgcard.sel { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold); }

.hgimg-w { height: 200px; overflow: hidden; position: relative; }
.hgimg { width: 100%; height: 100%; background-size: cover; background-position: center; transition: transform 0.6s ease; }
.hgbadge {
  position: absolute; top: 14px; left: 14px;
  padding: 5px 12px; border-radius: 20px; background: rgba(0,0,0,0.70); backdrop-filter: blur(10px);
  font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold);
  border: 0.5px solid rgba(201,168,76,0.30);
}
.hgsave {
  position: absolute; top: 14px; right: 14px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,0,0,0.58); display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: 0.5px solid rgba(255,255,255,0.14); transition: all 0.2s;
}
.hgsave:hover { background: var(--gold); }
.hgsave i { font-size: 14px; color: #fff; }

.hgbody { padding: 18px; }
.hgreg { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
.hgname { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: -0.3px; margin-bottom: 8px; }
body.light .hgname { color: #1a1208; }
.hgdesc { font-size: 10px; color: var(--w50); line-height: 1.7; margin-bottom: 14px; }
body.light .hgdesc { color: rgba(26,18,8,0.50); }
.hgfoot {
  display: flex; align-items: center; justify-content: space-between;
  border-top: 0.5px solid rgba(255,255,255,0.08); padding-top: 14px;
}
body.light .hgfoot { border-top-color: rgba(26,18,8,0.08); }
.hgmeta { display: flex; align-items: center; gap: 10px; }
.hgmi { display: flex; align-items: center; gap: 4px; font-size: 9px; color: var(--w50); }
body.light .hgmi { color: rgba(26,18,8,0.50); }
.hgmi i { font-size: 12px; }
.btn-gold {
  padding: 9px 18px; border-radius: 4px; background: var(--gold); border: none;
  font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--dark);
  cursor: pointer; transition: all 0.2s;
}
.btn-gold:hover { background: var(--gold-lt); transform: scale(1.03); }

/* ══════════════════════════════════════════
   DESTINATIONS
══════════════════════════════════════════ */
#sec-destinations { background: var(--bg-grad); }
.dest-wrap { display: grid; grid-template-columns: 1fr 380px; min-height: calc(100vh - var(--nav-h)); }

.dest-left { position: relative; overflow: hidden; }
.dest-img {
  position: absolute; inset: 0; background-size: cover; background-position: center;
  filter: brightness(0.68); transition: background-image 0.7s ease;
}
.dest-rings { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.10); animation: ringSpin 30s linear infinite;
  width: 600px; height: 600px;
}
.ring:nth-child(2) { width: 440px; height: 440px; border-color: rgba(201,168,76,0.07); animation-duration: 22s; animation-direction: reverse; }
.ring:nth-child(3) { width: 280px; height: 280px; border-color: rgba(201,168,76,0.12); animation-duration: 16s; }
@keyframes ringSpin { to { transform: rotate(360deg); } }

.dest-pin { position: absolute; cursor: pointer; z-index: 6; }
.dest-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--gold); border: 2px solid rgba(255,255,255,0.80);
  box-shadow: 0 0 0 4px rgba(201,168,76,0.28); animation: dotPulse 2s ease infinite;
}
@keyframes dotPulse { 0%,100%{box-shadow:0 0 0 4px rgba(201,168,76,0.28);} 50%{box-shadow:0 0 0 8px rgba(201,168,76,0.12);} }

.dest-info {
  position: relative; z-index: 5; padding: 48px; height: 100%;
  display: flex; flex-direction: column; justify-content: space-between;
  background: linear-gradient(105deg, rgba(0,0,0,0.76) 35%, rgba(0,0,0,0.18) 100%);
}
.dest-info h1 { font-size: clamp(32px, 4vw, 54px); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; line-height: 0.95; margin-bottom: 10px; }
.dest-info p { font-size: 11px; color: var(--w50); max-width: 330px; line-height: 1.80; margin-top: 8px; }

.dest-card-info {
  padding: 20px; background: rgba(0,0,0,0.48);
  border: 0.5px solid rgba(201,168,76,0.28); border-radius: 12px; backdrop-filter: blur(10px);
}
.dci-name { font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; margin-bottom: 4px; }
.dci-country { font-size: 10px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
.dci-stats { display: flex; gap: 24px; }
.dci-stat { display: flex; flex-direction: column; gap: 2px; }
.dci-val { font-size: 18px; font-weight: 800; color: var(--gold); }
.dci-lbl { font-size: 8px; color: var(--w50); letter-spacing: 1px; text-transform: uppercase; }


.dest-sidebar {
  background: radial-gradient(ellipse 150% 100% at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 60%), #0d0b09;
  border-left: 0.5px solid rgba(255,255,255,0.07);
  padding: 28px 18px; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column; gap: 12px;
  max-height: calc(100vh - var(--nav-h));
  scroll-behavior: smooth;
}
body.light .dest-sidebar {
  background: radial-gradient(ellipse 150% 100% at 50% 0%, rgba(201,168,76,0.09) 0%, transparent 60%), rgba(232,224,214,0.97);
  border-left-color: rgba(26,18,8,0.08);
}
.dest-sidebar::-webkit-scrollbar { width: 3px; }
.dest-sidebar::-webkit-scrollbar-thumb { background: var(--gold-dim); }
.ds-label { font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--w50); margin-bottom: 4px; flex-shrink: 0; }
body.light .ds-label { color: rgba(26,18,8,0.42); }

/* ── Destination card: full thumbnail with overlay text ── */
.ditem {
  border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.07);
  cursor: pointer; position: relative; flex-shrink: 0;
  height: 100px; transition: all 0.3s;
}
body.light .ditem { border-color: rgba(26,18,8,0.08); }
.ditem:hover { border-color: rgba(201,168,76,0.40); transform: translateX(4px); box-shadow: 0 8px 24px rgba(0,0,0,0.45); }
.ditem.on { border-color: var(--gold); box-shadow: 0 0 0 1.5px var(--gold); }
/* full-bleed background image */
.ditem-img {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: transform 0.5s ease;
}
.ditem:hover .ditem-img { transform: scale(1.06); }
/* dark overlay gradient */
.ditem-img::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.30) 55%, rgba(0,0,0,0.10) 100%);
}
/* text on top of image */
.ditem-body {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 10px 12px; z-index: 2;
}
.ditem-name { font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; color: #fff; line-height: 1.1; }
.ditem-country { font-size: 8px; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; }
.ditem-stat { font-size: 7.5px; color: rgba(255,255,255,0.55); margin-top: 4px; }

/* ══════════════════════════════════════════
   FOOD
══════════════════════════════════════════ */
#sec-food { background: var(--bg-grad2); }

.food-hero {
  position: relative; height: 50vh; min-height: 280px;
  overflow: hidden; display: flex; align-items: flex-end;
}
.food-hero-bg {
  position: absolute; inset: 0;
  background: url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1600&q=80') center/cover;
  animation: slowZoom 25s ease infinite alternate;
}
.food-hero-ov { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.22) 0%, rgba(10,10,10,0.92) 100%); }
.food-hero-txt { position: relative; z-index: 2; padding: 48px 64px; }
.food-hero-txt h1 { font-size: clamp(40px,5vw,68px); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; line-height: 0.95; }

.food-sec-title {
  font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--w50);
  display: flex; align-items: center; gap: 14px; padding: 32px 64px 0;
}
.food-sec-title::after { content: ''; flex: 1; height: 0.5px; background: rgba(255,255,255,0.10); }
body.light .food-sec-title { color: rgba(26,18,8,0.40); }
body.light .food-sec-title::after { background: rgba(26,18,8,0.08); }

/* 4-col photo cards — horizontal scroll */
.fg4 {
  display: flex; gap: 20px;
  padding: 20px 64px 40px;
  overflow-x: auto; overflow-y: hidden;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  cursor: grab;
}
.fg4:active { cursor: grabbing; }
.fg4::-webkit-scrollbar { height: 3px; }
.fg4::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }
.fcard {
  position: relative; border-radius: 20px; overflow: hidden; cursor: pointer;
  height: 340px; min-width: 260px; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.07);
  scroll-snap-align: start;
  transition: transform 0.5s cubic-bezier(0.23,1,0.32,1), box-shadow 0.5s;
}
body.light .fcard { border-color: rgba(26,18,8,0.10); }
.fcard:hover {
  transform: translateY(-16px) rotateX(4deg) rotateY(-2deg) scale(1.03);
  box-shadow: 0 40px 80px rgba(0,0,0,0.68), 0 0 0 1px rgba(201,168,76,0.30);
}
.fcard-photo {
  position: absolute; inset: 0; background-size: cover; background-position: center;
  filter: brightness(0.72); transition: filter 0.5s, transform 0.5s;
}
.fcard:hover .fcard-photo { filter: brightness(0.88); transform: scale(1.05); }
.fcard-ov {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.90) 32%, rgba(0,0,0,0.04) 72%);
}
.fcard-steam {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 10px; opacity: 0; transition: opacity 0.4s;
}
.fcard:hover .fcard-steam { opacity: 1; }
.steam {
  width: 3px; height: 32px; border-radius: 3px;
  background: linear-gradient(to top, transparent, rgba(255,255,255,0.32));
  animation: steamUp 1.6s ease-in-out infinite;
}
.steam:nth-child(2) { animation-delay: 0.35s; height: 24px; }
.steam:nth-child(3) { animation-delay: 0.70s; height: 30px; }
@keyframes steamUp { 0%{transform:translateY(0) scaleX(1);opacity:0.6;} 100%{transform:translateY(-22px) scaleX(2);opacity:0;} }
.fcard-txt { position: absolute; bottom: 0; left: 0; right: 0; padding: 18px 20px; }
.fcard-origin { font-size: 8px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
.fcard-name { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: -0.3px; margin-bottom: 7px; line-height: 1.1; }
.fcard-desc { font-size: 9px; color: var(--w50); line-height: 1.55; }

/* 2-col wide cards */
.fg2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; padding: 20px 64px 80px; }
.fwcard {
  border-radius: 16px; overflow: hidden; height: 230px;
  cursor: pointer; border: 1px solid rgba(255,255,255,0.07);
  transition: transform 0.4s cubic-bezier(0.23,1,0.32,1), box-shadow 0.4s;
  background: var(--dark3); display: flex;
}
body.light .fwcard { background: var(--dark2); border-color: rgba(26,18,8,0.10); }
.fwcard:hover { transform: translateY(-8px) scale(1.01); box-shadow: 0 24px 60px rgba(0,0,0,0.55); }
.fwcard:hover .fwimg { transform: scale(1.06); }
.fwimg-w { width: 230px; flex-shrink: 0; overflow: hidden; }
.fwimg { width: 100%; height: 100%; background-size: cover; background-position: center; transition: transform 0.5s ease; }
.fwbody { padding: 26px; display: flex; flex-direction: column; justify-content: center; }
.fworigin { font-size: 8px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.fwname { font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: -0.3px; margin-bottom: 10px; }
body.light .fwname { color: #1a1208; }
.fwdesc { font-size: 10px; color: var(--w50); line-height: 1.70; margin-bottom: 16px; }
body.light .fwdesc { color: rgba(26,18,8,0.50); }
.fwtags { display: flex; flex-wrap: wrap; gap: 6px; }
.fwtag {
  padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.05);
  border: 0.5px solid rgba(255,255,255,0.12); font-size: 8px; color: var(--w50);
}
body.light .fwtag { background: rgba(26,18,8,0.04); border-color: rgba(26,18,8,0.12); color: rgba(26,18,8,0.45); }

/* ══════════════════════════════════════════
   OFFERS
══════════════════════════════════════════ */
#sec-offers { background: var(--bg-grad3); }
.offers-pad { padding: 48px 64px 80px; }
.offers-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 36px; }
.offers-head-l .plabel { margin-bottom: 10px; }
.offers-head-l h1 { font-size: clamp(36px,4.5vw,60px); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; line-height: 0.95; }
body.light .offers-head-l h1 { color: #1a1208; }
.offers-head-r { text-align: right; }

.clk-lbl { font-size: 8px; color: var(--w50); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
body.light .clk-lbl { color: rgba(26,18,8,0.45); }
.clk-row { display: flex; align-items: baseline; }
.clk-part { text-align: center; }
.clk-num { font-size: 32px; font-weight: 800; color: var(--gold); line-height: 1; font-variant-numeric: tabular-nums; }
.clk-ulbl { font-size: 7px; color: var(--w50); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px; }
body.light .clk-ulbl { color: rgba(26,18,8,0.45); }
.clk-sep { font-size: 28px; font-weight: 300; color: var(--gold); margin: 0 4px; padding-bottom: 4px; }
.clk-date { font-size: 10px; color: var(--w50); margin-top: 8px; letter-spacing: 0.5px; }
body.light .clk-date { color: rgba(26,18,8,0.45); }

.deal-banner {
  border-radius: 20px; overflow: hidden; position: relative; height: 300px;
  cursor: pointer; margin-bottom: 28px; transition: transform 0.4s;
}
.deal-banner:hover { transform: scale(1.01); }
.deal-bg {
  position: absolute; inset: 0;
  background: url('https://images.unsplash.com/photo-1540541338287-41700207dee6?w=1400&q=80') center/cover;
  filter: brightness(0.62); transition: transform 0.6s;
}
.deal-banner:hover .deal-bg { transform: scale(1.04); }
.deal-ov { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(0,0,0,0.80) 30%, transparent 75%); }
.deal-txt { position: relative; z-index: 2; padding: 48px; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
.deal-tag {
  display: inline-flex; align-items: center; gap: 8px; background: var(--gold);
  border-radius: 20px; padding: 5px 14px; margin-bottom: 14px;
  font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #1a1208; width: fit-content;
}
.deal-title { font-size: 40px; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; line-height: 0.95; margin-bottom: 10px; }
.deal-sub { font-size: 11px; color: var(--w70); }

.offers-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.ocard {
  border-radius: 16px; overflow: hidden; position: relative; height: 260px;
  cursor: pointer; transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
}
.ocard:hover { transform: translateY(-8px) scale(1.02); }
.ocard:hover .ocard-bg { transform: scale(1.08); filter: brightness(0.75); }
.ocard-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(0.60); transition: all 0.5s; }
.ocard-ov { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 60%); }
.ocard-txt { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; }
.ocard-name { font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: -0.3px; margin-bottom: 4px; }
.ocard-det { font-size: 9px; color: rgba(255,255,255,0.58); }

/* ══════════════════════════════════════════
   CONTACTS
══════════════════════════════════════════ */
#sec-contacts { background: var(--bg-grad2); }
.contacts-wrap { display: grid; grid-template-columns: 1fr 500px; min-height: calc(100vh - var(--nav-h)); }

.con-left { padding: 64px; display: flex; flex-direction: column; gap: 32px; }
.con-left h1 { font-size: clamp(34px,4vw,54px); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; line-height: 0.95; margin-bottom: 8px; }
body.light .con-left h1 { color: #1a1208; }
.con-intro { font-size: 11px; color: var(--w50); line-height: 1.80; max-width: 370px; margin-top: 14px; }
body.light .con-intro { color: rgba(26,18,8,0.50); }

.icard-list { display: flex; flex-direction: column; gap: 12px; }
.icard {
  display: flex; align-items: flex-start; gap: 16px; padding: 20px; border-radius: 12px;
  background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.08); transition: border-color 0.3s;
}
body.light .icard { background: rgba(26,18,8,0.03); border-color: rgba(26,18,8,0.08); }
.icard:hover { border-color: rgba(201,168,76,0.25); }
.icard-icon {
  width: 44px; height: 44px; border-radius: 12px; background: var(--gold-dim);
  border: 0.5px solid rgba(201,168,76,0.28); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.icard-icon i { font-size: 20px; color: var(--gold); }
.icard-t { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
.icard-v { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
body.light .icard-v { color: #1a1208; }
.icard-s { font-size: 10px; color: var(--w50); }
body.light .icard-s { color: rgba(26,18,8,0.50); }

.social-row { display: flex; gap: 10px; }
.soc-btn {
  width: 42px; height: 42px; border-radius: 10px;
  border: 0.5px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;
}
body.light .soc-btn { border-color: rgba(26,18,8,0.12); background: rgba(26,18,8,0.04); }
.soc-btn:hover { border-color: var(--gold); background: var(--gold-dim); }
.soc-btn i { font-size: 18px; color: var(--w70); transition: color 0.2s; }
body.light .soc-btn i { color: rgba(26,18,8,0.50); }
.soc-btn:hover i { color: var(--gold); }

.con-right {
  border-left: 0.5px solid rgba(255,255,255,0.07); padding: 64px 48px;
  position: relative; overflow-y: auto;
}
body.light .con-right { border-left-color: rgba(26,18,8,0.08); }
.con-right::before {
  content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 1px;
  background: linear-gradient(to bottom, transparent, var(--gold), transparent); opacity: 0.30;
}
.form-title { font-size: 18px; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; }
body.light .form-title { color: #1a1208; }
.form-sub { font-size: 10px; color: var(--w50); margin-bottom: 28px; line-height: 1.70; }
body.light .form-sub { color: rgba(26,18,8,0.50); }

.fgrp { margin-bottom: 18px; }
.fgrp label {
  display: block; font-size: 8px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
}
.fgrp input, .fgrp select, .fgrp textarea {
  width: 100%; background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.10);
  border-radius: 10px; padding: 13px 16px; color: #fff;
  font-family: 'Montserrat', sans-serif; font-size: 12px; outline: none;
  transition: border-color 0.2s; resize: none; appearance: none;
}
body.light .fgrp input,
body.light .fgrp select,
body.light .fgrp textarea {
  background: rgba(26,18,8,0.05); border-color: rgba(26,18,8,0.14); color: #1a1208;
}
.fgrp input:focus, .fgrp select:focus, .fgrp textarea:focus { border-color: var(--gold); background: rgba(201,168,76,0.04); }
.fgrp input::placeholder, .fgrp textarea::placeholder { color: var(--w50); }
body.light .fgrp input::placeholder,
body.light .fgrp textarea::placeholder { color: rgba(26,18,8,0.35); }
.fgrp select option { background: #1a1a1a; }
body.light .fgrp select option { background: #ddd5c8; color: #1a1208; }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.btn-send {
  width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 10px;
  font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase; color: #1a1208;
  cursor: pointer; transition: all 0.3s;
  display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 8px;
}
.btn-send:hover { background: var(--gold-lt); transform: translateY(-2px); box-shadow: 0 12px 30px rgba(201,168,76,0.25); }

/* ══════════════════════════════════════════
   FOOTER — single copyright line
══════════════════════════════════════════ */
footer {
  background: var(--dark2);
  border-top: 0.5px solid rgba(201,168,76,0.18);
  position: relative;
  transition: background 0.4s;
}
footer::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.35;
}

.foot-simple {
  display: flex; align-items: center; justify-content: flex-start; gap: 6px;
  padding: 20px 48px;
  font-size: 11px; color: var(--w50);
  transition: color 0.4s;
}
body.light .foot-simple { color: rgba(26,18,8,0.40); }
.foot-simple i { font-size: 13px; }

/* ══════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════ */
.fade-up { animation: fadeUp 0.65s cubic-bezier(0.23,1,0.32,1) forwards; }
@keyframes fadeUp { from{opacity:0;transform:translateY(28px);} to{opacity:1;transform:translateY(0);} }
.d1{animation-delay:0.05s;opacity:0;} .d2{animation-delay:0.12s;opacity:0;} .d3{animation-delay:0.19s;opacity:0;}
.d4{animation-delay:0.26s;opacity:0;} .d5{animation-delay:0.33s;opacity:0;} .d6{animation-delay:0.40s;opacity:0;}
/* ══════════════════════════════════════════
   HAMBURGER BUTTON (hidden on desktop)
══════════════════════════════════════════ */
.hamburger {
  display: none;
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.08);
  flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  cursor: pointer; flex-shrink: 0;
  transition: border-color 0.25s, background 0.25s; z-index: 600;
}
.hamburger:hover { border-color: var(--gold); background: rgba(201,168,76,0.15); }
body.light .hamburger { border-color: rgba(26,18,8,0.20); background: rgba(26,18,8,0.07); }
.hamburger span {
  display: block; width: 17px; height: 1.8px;
  background: rgba(255,255,255,0.85); border-radius: 2px; transition: all 0.32s;
}
body.light .hamburger span { background: rgba(26,18,8,0.75); }
.hamburger.open span:nth-child(1) { transform: translateY(6.8px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger.open span:nth-child(3) { transform: translateY(-6.8px) rotate(-45deg); }

/* ══════════════════════════════════════════
   MOBILE DRAWER (hidden on desktop)
══════════════════════════════════════════ */
.mobile-drawer {
  display: none;
  position: fixed; top: var(--nav-h); left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse 140% 80% at 20% 20%, rgba(201,168,76,0.07) 0%, transparent 55%), rgba(13,11,9,0.97);
  backdrop-filter: blur(28px);
  z-index: 490; flex-direction: column;
  padding: 12px 0 32px;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.38s cubic-bezier(0.23,1,0.32,1);
  border-top: 0.5px solid rgba(255,255,255,0.07);
}
body.light .mobile-drawer {
  background: radial-gradient(ellipse 140% 80% at 20% 20%, rgba(201,168,76,0.09) 0%, transparent 55%), rgba(237,230,218,0.97);
  border-top-color: rgba(26,18,8,0.08);
}
.mobile-drawer.open { transform: translateX(0); }

.mobile-drawer ul { list-style: none; }
.mobile-drawer ul li a {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 28px;
  color: rgba(255,255,255,0.65); font-size: 14px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; text-decoration: none;
  border-bottom: 0.5px solid rgba(255,255,255,0.05);
  transition: color 0.2s, background 0.2s; cursor: pointer;
}
body.light .mobile-drawer ul li a {
  color: rgba(26,18,8,0.55);
  border-bottom-color: rgba(26,18,8,0.06);
}
.mobile-drawer ul li a:hover,
.mobile-drawer ul li a.active { color: var(--gold); background: rgba(201,168,76,0.06); }

/* Drawer bottom actions */
.drawer-actions {
  display: flex; align-items: center; gap: 12px;
  padding: 24px 28px 0;
  margin-top: 8px;
  border-top: 0.5px solid rgba(255,255,255,0.07);
}
body.light .drawer-actions { border-top-color: rgba(26,18,8,0.07); }

/* ══════════════════════════════════════════
   HOME HERO — touch swipe track
══════════════════════════════════════════ */
.home-wrap { touch-action: pan-y; }  /* allow vertical scroll but intercept horizontal */

/* ══════════════════════════════════════════
   TABLET (≤1024px)
══════════════════════════════════════════ */
@media (max-width: 1024px) {
  #mainNav { padding: 0 24px; }
  .nav-links { gap: 16px; }
  .nav-links a { font-size: 9px; letter-spacing: 1px; }

  .dest-wrap { grid-template-columns: 1fr 270px; }
  .dest-info { padding: 32px 24px; }
  .dest-sidebar { padding: 18px 12px; gap: 10px; }
  .ditem { height: 88px; }

  .fg4 { padding: 16px 24px 32px; gap: 14px; }
  .fcard { min-width: 220px; height: 300px; }
  .fg2 { padding: 16px 24px 48px; gap: 14px; }

  .hgrid { padding: 16px 24px 48px; }
  .offers-pad { padding: 28px 28px 56px; }
  .con-left, .con-right { padding: 36px 28px; }
}

/* ══════════════════════════════════════════
   MOBILE (≤768px) — hamburger + 2-col cards
══════════════════════════════════════════ */
@media (max-width: 768px) {
  /* 1. NAV — show hamburger, hide desktop links */
  #mainNav { padding: 0 16px; }
  .nav-links { display: none; }          /* hidden — drawer takes over */
  .hamburger { display: flex; }          /* show hamburger */
  .mobile-drawer { display: flex; }      /* drawer available */

  .nav-logo { font-size: 10px; letter-spacing: 2px; gap: 8px; }
  .nav-logo-ring { width: 28px; height: 28px; }
  .nav-logo-ring i { font-size: 13px; }
  .nav-actions { gap: 8px; }
  .btn-dm { width: 34px; height: 34px; }
  .lang-globe { width: 34px; height: 34px; }

  /* 2. HOME — touch swipe support; hero text & bottom repositioned */
  #sec-home { height: 100svh; }
  .hero-txt {
    left: 20px; right: 20px; max-width: 100%;
    top: auto; transform: none;
    bottom: 210px;
  }
  .hero-title { font-size: clamp(30px, 9vw, 52px); margin-bottom: 12px; }
  .hero-desc { font-size: 10.5px; max-width: 260px; margin-bottom: 20px; }
  .hero-actions { gap: 12px; }
  .btn-disc { font-size: 9px; padding: 10px 18px; }

  .hero-bot {
    left: 16px; right: 16px; bottom: 20px;
    flex-direction: column-reverse; gap: 12px; align-items: flex-start;
  }
  .ctrl-col { flex-direction: row; align-items: center; gap: 12px; margin-right: 0; }
  .prog-bar { width: 100px; }

  /* cards row: horizontal swipe strip */
  .cards-row {
    width: 100%; overflow-x: auto; overflow-y: hidden;
    scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
    gap: 8px; padding-bottom: 4px;
    scrollbar-width: none;
  }
  .cards-row::-webkit-scrollbar { display: none; }
  .hcard {
    width: 110px; height: 150px; flex-shrink: 0; scroll-snap-align: start;
  }
  .hcard-name { font-size: 10px; }

  .slide-num { right: 16px; bottom: 16px; font-size: 22px; }
  .scroll-hint { display: none; } /* not needed on mobile */

  /* 3. ALL SECTIONS — 2-column minimum */

  /* Holidays */
  .sec + .sec { padding-top: var(--nav-h); }
  .hhero { height: 42vw; min-height: 200px; }
  .hhero-txt { padding: 20px 16px; }
  .hhero-txt h1 { font-size: clamp(22px, 7vw, 40px); }
  .hhero-tag { top: var(--nav-h); right: 14px; font-size: 8px; padding: 5px 10px; }

  .filter-row {
    padding: 12px 16px 10px; gap: 6px;
    flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .ftab { padding: 8px 14px; font-size: 8px; white-space: nowrap; min-height: 34px; }

  /* ★ 2-col holiday grid */
  .hgrid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px; padding: 14px 16px 48px;
  }
  .hgimg-w { height: 150px; }
  .hgname { font-size: 13px; }
  .hgdesc { font-size: 9px; line-height: 1.55; margin-bottom: 10px; }
  .hgbody { padding: 12px; }
  .hgfoot { flex-wrap: wrap; gap: 8px; }
  .btn-gold { font-size: 8px; padding: 7px 12px; }

  /* Destinations — SAMA seperti desktop: side by side, sidebar scroll atas-bawah */
  #sec-destinations { min-height: 100svh; }
  .dest-wrap {
    grid-template-columns: 1fr 160px;  /* peta lebar, sidebar sempit */
    grid-template-rows: none;
    min-height: calc(100svh - var(--nav-h));
    height: calc(100svh - var(--nav-h));
  }
  .dest-left {
    height: 100%;
    grid-row: unset;
    position: relative;
    overflow: hidden;
  }
  .dest-info {
    padding: 16px 14px;
    background: linear-gradient(105deg, rgba(0,0,0,0.82) 40%, rgba(0,0,0,0.22) 100%);
  }
  .dest-info h1 { font-size: clamp(16px, 5vw, 26px); line-height: 1; margin-bottom: 6px; }
  .dest-info p { display: none; }
  .dest-card-info { padding: 10px 12px; margin-top: 10px; }
  .dci-name { font-size: 15px; margin-bottom: 2px; }
  .dci-country { font-size: 8px; margin-bottom: 8px; }
  .dci-stats { gap: 14px; }
  .dci-val { font-size: 15px; }
  .dci-lbl { font-size: 7px; }
  .dest-regions { display: none; } /* hide region buttons — too small */

  /* Sidebar: vertikal scroll seperti desktop, bukan grid 2-kolom */
  .dest-sidebar {
    grid-row: unset;
    grid-template-columns: unset;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-left: 0.5px solid rgba(255,255,255,0.07);
    border-top: none;
    padding: 12px 8px;
    overflow-y: auto;
    overflow-x: hidden;
    max-height: calc(100svh - var(--nav-h));
    height: calc(100svh - var(--nav-h));
    /* custom thin scrollbar */
    scrollbar-width: thin;
    scrollbar-color: rgba(201,168,76,0.3) transparent;
  }
  body.light .dest-sidebar { border-top: none; border-left-color: rgba(26,18,8,0.08); }
  .dest-sidebar::-webkit-scrollbar { width: 3px; }
  .dest-sidebar::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.35); border-radius: 2px; }

  .ds-label {
    grid-column: unset;
    font-size: 7px; letter-spacing: 2px; margin-bottom: 4px; flex-shrink: 0;
    writing-mode: horizontal-tb; /* reset any stacking oddities */
  }

  /* ditem: full width in sidebar column, compact height */
  .ditem {
    height: 80px;
    transform: none !important;
    width: 100%;
    flex-shrink: 0;
  }
  .ditem:hover { transform: none !important; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
  .ditem.on { border-color: var(--gold); }
  .ditem-name { font-size: 10px; }
  .ditem-country { font-size: 7px; }
  .ditem-stat { font-size: 6.5px; margin-top: 2px; }

  /* Food */
  .food-hero { height: 40vw; min-height: 200px; }
  .food-hero-txt { padding: 20px 16px; }
  .food-hero-txt h1 { font-size: clamp(22px, 7vw, 40px); }
  .food-sec-title { padding: 20px 16px 0; font-size: 8px; }

  /* fg4: touch swipe strip (stays horizontal) */
  .fg4 { padding: 14px 16px 28px; gap: 10px; }
  .fcard { min-width: 160px; height: 250px; }
  .fcard-name { font-size: 13px; }
  .fcard-origin { font-size: 7px; }

  /* ★ 2-col food wide grid */
  .fg2 {
    grid-template-columns: repeat(2, 1fr);
    padding: 14px 16px 48px; gap: 10px;
  }
  .fwcard { height: auto; flex-direction: column; }
  .fwimg-w { width: 100%; height: 130px; }
  .fwbody { padding: 12px; }
  .fwname { font-size: 13px; }
  .fwdesc { font-size: 9px; }

  /* Offers */
  .offers-pad { padding: 20px 16px 48px; }
  .offers-head {
    flex-direction: row;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 24px;
  }
  .offers-head-l h1 { font-size: clamp(24px, 7vw, 40px); }
  .offers-head-r { text-align: right; flex-shrink: 0; }
  .clk-num { font-size: 20px; }
  .clk-sep { font-size: 18px; }
  .clk-lbl { font-size: 7px; }
  .clk-ulbl { font-size: 6px; }
  .clk-date { font-size: 9px; }
  .deal-banner { height: 200px; }
  .deal-txt { padding: 24px; }
  .deal-title { font-size: 26px; }
  .deal-sub { font-size: 10px; }

  /* ★ 2-col offers grid */
  .offers-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .ocard { height: 200px; }
  .ocard-name { font-size: 14px; }
  .ocard-det { font-size: 8px; }

  /* Contacts */
  .contacts-wrap { grid-template-columns: 1fr; }
  .con-left { padding: 24px 16px 20px; gap: 20px; }
  .con-left h1 { font-size: clamp(28px, 7vw, 44px); }
  .icard { padding: 14px; gap: 12px; }
  .icard-icon { width: 36px; height: 36px; border-radius: 10px; }
  .icard-icon i { font-size: 16px; }
  .icard-v { font-size: 12px; }
  .icard-s { font-size: 9px; }

  .con-right {
    padding: 20px 16px 40px;
    border-left: none;
    border-top: 0.5px solid rgba(255,255,255,0.08);
  }
  body.light .con-right { border-top-color: rgba(26,18,8,0.08); }
  .frow { grid-template-columns: 1fr 1fr; }

  /* Footer */
  .foot-simple { padding: 16px; font-size: 10px; }

  .plabel { font-size: 8px; }
}

/* ══════════════════════════════════════════
   SMALL PHONES (≤430px)
══════════════════════════════════════════ */
@media (max-width: 430px) {
  .hgrid { gap: 8px; padding: 10px 12px 40px; }
  .hgimg-w { height: 130px; }
  .hgname { font-size: 12px; }

  .dest-sidebar { gap: 6px; padding: 10px 6px; }
  .ditem { height: 70px; }
  .ditem-name { font-size: 9px; }
  .dest-wrap { grid-template-columns: 1fr 140px; }

  .offers-grid { gap: 8px; }
  .ocard { height: 180px; }

  .fg2 { gap: 8px; padding: 12px 12px 40px; }
  .fwimg-w { height: 110px; }

  .frow { grid-template-columns: 1fr; } /* stack name fields on tiny screens */
}

/* ══════════════════════════════════════════
   NAV TOP PROGRESS BAR (auto-slide timer)
══════════════════════════════════════════ */
#navProgressBar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 600;
  height: 2px;
  background: transparent;
  pointer-events: none;
}
#navProgressFill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--gold), var(--gold-lt));
  border-radius: 0 2px 2px 0;
  box-shadow: 0 0 8px rgba(201,168,76,0.6);
  transition: width linear;
}

/* Clean view timer bar — replaces normal bar during clean view, fades out */
#navCleanTimer {
  position: fixed; top: 0; left: 0; right: 0; z-index: 601;
  height: 3px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
}
#navCleanTimer.active { opacity: 1; }
#navCleanTimerFill {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
  border-radius: 2px;
  animation: none;
}
#navCleanTimer.active #navCleanTimerFill {
  animation: cleanTimerDrain 5s linear forwards;
}
@keyframes cleanTimerDrain {
  0%   { width: 100%; opacity: 1; background: linear-gradient(90deg, rgba(255,255,255,0.55), rgba(201,168,76,0.8), rgba(255,255,255,0.55)); }
  80%  { opacity: 0.7; }
  100% { width: 0%;   opacity: 0; }
}

/* HOME CLEAN VIEW — hide bottom controls temporarily */
.hero-bot,
.scroll-hint {
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.slide-num {
  transition: opacity 0.5s ease;
}
.home-clean-view .hero-bot {
  opacity: 0;
  pointer-events: none;
  transform: translateY(20px);
}
.home-clean-view .scroll-hint {
  opacity: 0;
  pointer-events: none;
}

/* Hero text — smooth transition for centering */
.hero-txt {
  transition: left 0.7s cubic-bezier(0.23,1,0.32,1),
              top 0.7s cubic-bezier(0.23,1,0.32,1),
              transform 0.7s cubic-bezier(0.23,1,0.32,1),
              max-width 0.7s cubic-bezier(0.23,1,0.32,1),
              text-align 0.3s ease;
}

/* Clean view: hero text moves to center */
.home-clean-view .hero-txt {
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  max-width: 700px;
  text-align: center;
}

/* Center the loc-tag line & decorative bar */
.home-clean-view .hero-txt .loc-tag {
  justify-content: center;
}
.home-clean-view .hero-txt .loc-tag::before {
  display: none;
}

/* Strengthen center overlay during clean view */
.home-clean-view .hero-ov {
  background: radial-gradient(ellipse 70% 70% at 50% 50%, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.22) 100%),
              linear-gradient(105deg, rgba(0,0,0,0.62) 0%, rgba(0,0,0,0.20) 100%);
}
body.light .home-clean-view .hero-ov {
  background: radial-gradient(ellipse 70% 70% at 50% 50%, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.30) 100%),
              linear-gradient(105deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.28) 100%);
}

/* Hero title clickable style */
#heroTitle {
  cursor: pointer;
}
#heroTitle:hover {
  text-shadow: 0 2px 30px rgba(0,0,0,0.5), 0 0 40px rgba(201,168,76,0.35);
}

/* ══════════════════════════════════════════
   LIGHT MODE — teks di atas foto card tetap terlihat
══════════════════════════════════════════ */

/* 1. HOME — hero title, region tag, desc */
body.light .hero-title {
  color: #fff;
  text-shadow: 0 2px 24px rgba(0,0,0,0.90), 0 0 60px rgba(0,0,0,0.65);
}
body.light .loc-tag span {
  color: rgba(255,255,255,0.92);
  text-shadow: 0 1px 8px rgba(0,0,0,0.80);
}
body.light .hero-desc {
  color: rgba(255,255,255,0.84);
  text-shadow: 0 1px 6px rgba(0,0,0,0.70);
}
body.light .hero-ov {
  background: linear-gradient(105deg, rgba(0,0,0,0.82) 30%, rgba(0,0,0,0.30) 70%);
}
body.light .slide-num { color: rgba(255,255,255,0.50); }
body.light .slide-num b { color: #fff; }

/* 2. HOLIDAYS — hero banner atas */
body.light .hhero-ov {
  background: linear-gradient(to bottom, rgba(0,0,0,0.30) 0%, rgba(0,0,0,0.94) 100%);
}
body.light .hhero-txt h1 {
  color: #fff;
  text-shadow: 0 2px 20px rgba(0,0,0,0.88);
}

/* 3. DESTINATIONS — panel kiri atas foto */
body.light .dest-img { filter: brightness(0.62); }
body.light .dest-info {
  background: linear-gradient(105deg, rgba(0,0,0,0.78) 35%, rgba(0,0,0,0.22) 100%);
}
body.light .dest-info h1 {
  color: #fff;
  text-shadow: 0 2px 16px rgba(0,0,0,0.75);
}
body.light .dest-info p { color: rgba(255,255,255,0.80); }
body.light .dci-name {
  color: #fff;
  text-shadow: 0 1px 10px rgba(0,0,0,0.65);
}
body.light .dci-lbl { color: rgba(255,255,255,0.65); }
/* sidebar destination item */
body.light .ditem-img::after {
  background: linear-gradient(to top, rgba(0,0,0,0.90) 0%, rgba(0,0,0,0.44) 55%, rgba(0,0,0,0.20) 100%);
}
body.light .ditem-name {
  color: #fff;
  text-shadow: 0 1px 8px rgba(0,0,0,0.80);
}
body.light .ditem-stat { color: rgba(255,255,255,0.72); }

/* 4. FOOD — food hero banner + horizontal scroll cards (fcard) */
body.light .food-hero-ov {
  background: linear-gradient(to bottom, rgba(0,0,0,0.34) 0%, rgba(0,0,0,0.96) 100%);
}
body.light .food-hero-txt h1 {
  color: #fff;
  text-shadow: 0 2px 20px rgba(0,0,0,0.88);
}
body.light .fcard-photo { filter: brightness(0.58); }
body.light .fcard-name {
  color: #fff;
  text-shadow: 0 1px 10px rgba(0,0,0,0.80);
}
body.light .fcard-desc { color: rgba(255,255,255,0.80); }

/* 5. OFFERS — deal banner + semua ocard */
body.light .deal-ov {
  background: linear-gradient(90deg, rgba(0,0,0,0.88) 30%, rgba(0,0,0,0.20) 80%);
}
body.light .deal-title {
  color: #fff;
  text-shadow: 0 2px 18px rgba(0,0,0,0.85);
}
body.light .deal-sub { color: rgba(255,255,255,0.84); }
body.light .ocard-bg { filter: brightness(0.48); }
body.light .ocard-ov {
  background: linear-gradient(to top, rgba(0,0,0,0.94) 0%, rgba(0,0,0,0.22) 60%);
}
body.light .ocard-name {
  color: #fff;
  text-shadow: 0 1px 12px rgba(0,0,0,0.88);
}
body.light .ocard-det { color: rgba(255,255,255,0.74); }

/* ══════════════════════════════════════════
   TOUCH TARGETS
══════════════════════════════════════════ */
@media (hover: none) and (pointer: coarse) {
  .arr-btn, .btn-dm, .lang-globe, .hamburger { min-width: 40px; min-height: 40px; }
  .ftab { min-height: 36px; }
  .ditem { cursor: default; }
  .hgcard { cursor: default; }
}
</style>
</head>
<body>

<div id="navProgressBar"><div id="navProgressFill"></div></div>
<!-- ═══ NAV CLEAN VIEW TIMER BAR ═══ -->
<div id="navCleanTimer"><div id="navCleanTimerFill"></div></div>

<!-- ═══ FIXED NAV ═══ -->
<nav id="mainNav">

<!-- ═══ HOME ═══ -->
<section class="sec" id="sec-home">
  <div class="home-wrap">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-ov"></div>
    <div class="hero-txt">
      <div class="loc-tag"><span id="heroReg"></span></div>

function updateNav() {
  const nav = document.getElementById('mainNav');
  if (window.scrollY < window.innerHeight * 0.80) {
    nav.classList.remove('solid');
  } else {
    nav.classList.add('solid');
  }
  // active link
  const secs = ['home','holidays','destinations','food','offers','contacts'];
  const navH = nav.offsetHeight;
  let cur = 'home';
  secs.forEach(id => {
    const el = document.getElementById('sec-'+id);
    if (el && window.scrollY >= el.offsetTop - navH - 60) cur = id;
  });
  document.querySelectorAll('.nav-links a, .mobile-drawer a').forEach(a => {
    a.classList.toggle('active', a.dataset.sec === cur);
  });
}
window.addEventListener('scroll', updateNav, { passive:true });

════════════════════════════════════ */
let cur = 0, autoT = null;
const TOTAL = DESTS.length;
const AUTO_DURATION = 10000; // 10 detik

// Nav progress bar elements
const navProgFill = document.getElementById('navProgressFill');
const navCleanTimer = document.getElementById('navCleanTimer');
const navCleanFill = document.getElementById('navCleanTimerFill');

// Animate nav progress bar from 0→100% over AUTO_DURATION
let _navProgAnim = null;
function startNavProgress() {
  if (navProgFill) {
    navProgFill.style.transition = 'none';
    navProgFill.style.width = '0%';
    void navProgFill.offsetWidth; // reflow
    navProgFill.style.transition = `width ${AUTO_DURATION}ms linear`;
    navProgFill.style.width = '100%';
  }
}
function resetNavProgress() {
  if (navProgFill) {
    navProgFill.style.transition = 'none';
    navProgFill.style.width = '0%';
  }
}

// Clean view state
let _cleanViewTimer = null;
function triggerCleanView() {
  const homeWrap = document.querySelector('.home-wrap');
  if (!homeWrap) return;
  if (_cleanViewTimer) { clearTimeout(_cleanViewTimer); _cleanViewTimer = null; }

  // Hide bottom controls
  homeWrap.classList.add('home-clean-view');

  // Pause nav progress bar, hide it
  resetNavProgress();

  // Show clean timer bar animation above nav
  navCleanTimer.classList.remove('active');
  void navCleanTimer.offsetWidth; // reflow to restart animation
  navCleanTimer.classList.add('active');

  _cleanViewTimer = setTimeout(() => {
    // Restore
    homeWrap.classList.remove('home-clean-view');
    navCleanTimer.classList.remove('active');
    _cleanViewTimer = null;
    // Resume auto progress bar
    startNavProgress();
    resetAuto();
  }, 5000);
}

function renderSlider(animate) {
  const d = DESTS[cur];
  document.getElementById('heroBg').style.backgroundImage = `url('${d.heroBg}')`;
  document.getElementById('heroReg').textContent = d.region;
  const titleEl = document.getElementById('heroTitle');
  titleEl.innerHTML = d.l1+'<br>'+d.l2;
  if(animate){ titleEl.classList.remove('fade-up'); void titleEl.offsetWidth; titleEl.classList.add('fade-up'); }
  document.getElementById('slideN').textContent = cur+1;
  document.getElementById('progFill').style.width = ((cur+1)/TOTAL*100)+'%';

  const row = document.getElementById('cardsRow');
  row.innerHTML = '';
  for(let i=1;i<=6;i++){
    const idx=(cur+i)%TOTAL, d2=DESTS[idx];
    const c = document.createElement('div');
    c.className='hcard';
    c.innerHTML=`<div class="hcard-bg" style="background-image:url('${d2.cardBg}')"></div><div class="hcard-shade"></div><div class="hcard-info"><div class="hcard-reg">${d2.region}</div><div class="hcard-name">${d2.l1}<br>${d2.l2}</div></div>`;
    c.addEventListener('click',()=>{ cur=idx; renderSlider(true); resetAuto(); });
    row.appendChild(c);
  }
}

function resetAuto(){
  clearInterval(autoT);
  startNavProgress();
  autoT = setInterval(()=>{
    cur=(cur+1)%TOTAL;
    renderSlider(true);
    startNavProgress();
  }, AUTO_DURATION);
}

// Hero title click → clean view
document.getElementById('heroTitle').addEventListener('click', () => {
  // Only trigger if we're on the home section
  const homeEl = document.getElementById('sec-home');
  const rect = homeEl.getBoundingClientRect();
  if (rect.top > -window.innerHeight && rect.bottom > 0) {
    clearInterval(autoT); // pause auto during clean view
    triggerCleanView();

});

renderSlider(false);
resetAuto();

════════════════════════════════════ */
const DAYS_ID=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const DAYS_EN=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONS_ID=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const MONS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];

function tickClock() {
  const utc = Date.now() + (new Date().getTimezoneOffset()*60000);
  const wib = new Date(utc + 7*3600000);
  document.getElementById('clkH').textContent = String(wib.getHours()).padStart(2,'0');
  document.getElementById('clkM').textContent = String(wib.getMinutes()).padStart(2,'0');
  document.getElementById('clkS').textContent = String(wib.getSeconds()).padStart(2,'0');
  const days = lang==='id' ? DAYS_ID : DAYS_EN;
  const mons = lang==='id' ? MONS_ID : MONS_EN;
  document.getElementById('clkDate').textContent = `${days[wib.getDay()]}, ${wib.getDate()} ${mons[wib.getMonth()]} ${wib.getFullYear()}`;
}
setInterval(tickClock, 1000);
tickClock();

/* ════════════════════════════════════
   INTERSECTION OBSERVER (lazy render)
════════════════════════════════════ */
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(!e.isIntersecting) return;
    const id = e.target.id;
    if(id==='sec-holidays')     buildHolidays();
    if(id==='sec-destinations') buildDestinations();
    if(id==='sec-food')         buildFood();
    if(id==='sec-offers')       buildOffers();
  });
}, { threshold: 0.06 });
['sec-holidays','sec-destinations','sec-food','sec-offers'].forEach(id => {
  const el=document.getElementById(id); if(el) observer.observe(el);
});

/* ════════════════════════════════════
   HOME HERO — TOUCH SWIPE (mobile slide left/right)
════════════════════════════════════ */
(function() {
  const wrap = document.querySelector('.home-wrap');
  if (!wrap) return;
  let startX = 0, startY = 0, moved = false;

  wrap.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;
  }, { passive: true });

  wrap.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    // only intercept horizontal swipes
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
      moved = true;
    }
  }, { passive: true });

  wrap.addEventListener('touchend', e => {
    if (!moved) return;
    const dx = e.changedTouches[0].clientX - startX;
    const threshold = 50;
    if (dx < -threshold) {
      // swipe left → next slide
      cur = (cur + 1) % TOTAL;
      renderSlider(true);
      resetAuto();
    } else if (dx > threshold) {
      // swipe right → prev slide
      cur = (cur - 1 + TOTAL) % TOTAL;
      renderSlider(true);
      resetAuto();
    }
    moved = false;
  }, { passive: true });
})();

/* ════════════════════════════════════
   INFINITE CIRCULAR SCROLL — Destinations Sidebar (vertical)
════════════════════════════════════ */
function initDestInfiniteScroll() {
  const sb = document.getElementById('destSidebar');
  if (!sb || sb.dataset.infinite) return;
  sb.dataset.infinite = '1';

  const items = Array.from(sb.querySelectorAll('.ditem:not(.clone)'));
  if (items.length === 0) return;

  // Clone all items and append for infinite loop
  items.forEach(it => {
    const clone = it.cloneNode(true);
    clone.classList.add('clone');
    clone.addEventListener('click', () => { it.click(); });
    sb.appendChild(clone);
  });

  // Calculate total height of one set of items
  function singleH() {
    return items.reduce((s, el) => s + el.offsetHeight + parseInt(getComputedStyle(sb).gap || '12'), 0);
  }

  function loopScroll() {
    const half = singleH();
    if (half <= 0) return;
    if (sb.scrollTop >= half) {
      sb.scrollTop -= half;
    } else if (sb.scrollTop <= 0) {
      sb.scrollTop = half * 0.001;
    }
  }

  // Start at a tiny offset so user can scroll both directions immediately
  requestAnimationFrame(() => {
    sb.scrollTop = 1;
  });

  sb.addEventListener('scroll', loopScroll, { passive: true });
}

/* ════════════════════════════════════
   INFINITE CIRCULAR SCROLL — Food Strip (horizontal)
════════════════════════════════════ */
function initFoodInfiniteScroll() {
  const el = document.getElementById('fg4');
  if (!el || el.dataset.infinite) return;
  el.dataset.infinite = '1';

  // Clone all cards
  const cards = Array.from(el.querySelectorAll('.fcard'));
  if (cards.length === 0) return;
  cards.forEach(c => {
    const clone = c.cloneNode(true);
    clone.classList.add('clone');
    el.appendChild(clone);
  });

  const singleW = () => cards.reduce((s, c) => s + c.offsetWidth + 20, 0); // 20 = gap

  function loopH() {
    const half = singleW();
    if (el.scrollLeft >= half) {
      el.scrollLeft -= half;
    } else if (el.scrollLeft <= 0) {
      el.scrollLeft += half;
    }
  }

  requestAnimationFrame(() => { el.scrollLeft = 1; });
  el.addEventListener('scroll', loopH, { passive: true });

  // Drag scroll
  let isDown = false, startX, scrollLeft;
  el.addEventListener('mousedown', e => {
    isDown = true; el.classList.add('dragging');
    startX = e.pageX - el.offsetLeft;
    scrollLeft = el.scrollLeft;
  });
  el.addEventListener('mouseleave', () => { isDown = false; el.classList.remove('dragging'); });
  el.addEventListener('mouseup',    () => { isDown = false; el.classList.remove('dragging'); });
  el.addEventListener('mousemove',  e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - el.offsetLeft;
    el.scrollLeft = scrollLeft - (x - startX) * 1.2;
  });
}

// Hook into buildDestinations and buildFood after they run
const _origBuildDest = buildDestinations;
buildDestinations = function() {
  _origBuildDest();
  setTimeout(initDestInfiniteScroll, 100);
};

const _origBuildFood = buildFood;
buildFood = function() {
  _origBuildFood();
  setTimeout(initFoodInfiniteScroll, 100);
};
